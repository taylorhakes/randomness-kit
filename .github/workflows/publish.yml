name: Publish

# Publishes to npm when a GitHub Release is published.
# Setup required once: add an npm automation token as the repo secret NPM_TOKEN
# (Settings → Secrets and variables → Actions). Provenance is emitted via the
# id-token permission below.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint, typecheck, test, build)
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
