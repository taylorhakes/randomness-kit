name: Publish

# Publishes to npm when a GitHub Release is published.
#
# Auth uses npm Trusted Publishing (OIDC) — no token required. Setup required
# once: on npmjs.com, package Settings → Trusted Publisher → GitHub Actions,
# with repo taylorhakes/randomness-kit and workflow file publish.yml.
# Provenance is generated automatically; the id-token permission below is what
# lets the runner mint the OIDC token.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing requires npm >= 11.5.1; Node 22 bundles an older npm.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint, typecheck, test, build)
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build

      - name: Publish to npm
        run: npm publish
